name: Publish Packages

on:
  workflow_dispatch:
  push:
    tags:
      - "packages-v*"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: "@aartisr"

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Publish contract
        run: npm publish --workspace=packages/autograph-contract
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish core
        run: npm publish --workspace=packages/autograph-core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish feature
        run: npm publish --workspace=packages/autograph-feature
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
