name: Release Readiness

on:
  workflow_dispatch:

jobs:
  release-readiness:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate repo hygiene
        run: npm run test:repo

      - name: Validate package boundaries
        run: npm run test:boundaries

      - name: Run unit tests
        run: npm run test

      - name: Build standalone app
        run: npm run build

      - name: Summarize release readiness
        run: |
          echo "Autograph Exchange release-readiness checks passed." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Owner: aartisr (Aarti Sri Ravikumar)" >> $GITHUB_STEP_SUMMARY
